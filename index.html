      @media (max-width: 860px) {

      .cat-stage {
        position: absolute;
        inset: 0;
        z-index: 8;
        pointer-events: none;
      }

      .cat-sprite {
        position: absolute;
        left: 50%;
        width: clamp(72px, 10vw, 118px);
        height: clamp(90px, 13vw, 148px);
        transform-origin: 50% 100%;
        cursor: pointer;
        user-select: none;
        background: none;
        border: none;
        padding: 0;
        margin: 0;
        pointer-events: auto;
        touch-action: manipulation;
        --walk-duration: 1.65s;
        transition:
          transform 0.24s cubic-bezier(0.22, 0.7, 0.32, 1),
          bottom 0.24s cubic-bezier(0.22, 0.7, 0.32, 1),
          opacity 0.18s ease-out;
      }

      .cat-sprite::before,
      .cat-sprite::after {
        content: "";
        position: absolute;
        inset: 0;
        background-position: center bottom;
        background-repeat: no-repeat;
        background-size: contain;
        transform-origin: 50% 100%;
        transform: none;
        will-change: opacity;
      }

      .cat-sprite::before {
        background-image: url("./public/cat-walk-a.png");
        opacity: 1;
        animation: catWalkFrameA var(--walk-duration) steps(1, end) infinite;
      }

      .cat-sprite::after {
        display: block;
        background-image: url("./public/cat-walk-b.png");
        opacity: 0;
        transform: translate(1.7%, -0.8%);
        animation: catWalkFrameB var(--walk-duration) steps(1, end) infinite;
      }

      .cat-sprite[data-arrived="true"]::before {
        animation: none;
        opacity: 1;
      }

      .cat-sprite[data-arrived="true"]::after {
        display: none;
        animation: none;
      }

      @keyframes catWalkFrameA {
        0%,
        49.9% {
          opacity: 1;
        }
        50%,
        100% {
          opacity: 0;
        }
      }

      @keyframes catWalkFrameB {
        0%,
        49.9% {
          opacity: 0;
        }
        50%,
        100% {
          opacity: 1;
        }
      }

      .cat-sprite[data-status="failed"] {
        cursor: default;
        filter: grayscale(35%);
      }

      .cat-sprite[data-status="failed"]::before {
        background-image: url("./public/cat-returning.png");
        animation: kittyTurnBack 0.46s cubic-bezier(0.18, 0.9, 0.22, 1) both;
        opacity: 1;
        transform: none;
      }

      .cat-sprite[data-status="failed"]::after {
        content: "\1F494";
        inset: auto auto 68% 50%;
        display: block;
        width: auto;
        height: auto;
        background: none;
        font-size: clamp(12px, 1.6vw, 20px);
        line-height: 1;
        opacity: 1;
        text-shadow: none;
        transform: translateX(-50%);
        animation: brokenHeartBurst 0.72s cubic-bezier(0.22, 1, 0.36, 1) both;
        will-change: transform, opacity;
      }

      @keyframes brokenHeartBurst {
        0% {
          opacity: 0;
          transform: translateX(-50%) scale(0.3);
        }
        55% {
          opacity: 1;
          transform: translateX(-50%) scale(1.35);
        }
        100% {
          opacity: 1;
          transform: translateX(-50%) scale(1);
        }
      }

      @keyframes kittyTurnBack {
        0% {
          transform: rotateY(-180deg) scale(0.96);
        }
        64% {
          transform: rotateY(14deg) scale(1.02);
        }
        100% {
          transform: rotateY(0deg) scale(1);
        }
      }

      .petted-overlay {

        inset: 0;

      .petted-cat {

        transform: translate(-8%, 28%) scale(1);

      @keyframes pettedPop {

      .petting-sparkle {

      .petting-sparkle::before,

      .petting-sparkle::after {

      @keyframes sparkleFly {

        20% {

      @keyframes heartBurst {

    <script>
      const APPROACH_DURATION_MS = 6000;
      const LANE_PATTERN = [0, -1, 1, -2, 2];
      const DEADLINE_REMINDER_LEAD_MS = 10 * 60 * 1000;
      const FAILED_CAT_VISIBLE_MS = 5000;
      const DAILY_RESCUE_LIMIT_PER_REASON = 2;
      const TASK_STORAGE_KEY = "today-cat-tasks-v1";
      const DAILY_RECORD_STORAGE_KEY = "today-cat-daily-records-v1";
      const TASK_HISTORY_STORAGE_KEY = "today-cat-task-history-v1";

      function isBlankText(text) {
        return typeof text !== "string" || text.trim().length === 0;
      }

      function isValidFutureDeadline(deadlineAt, now) {
        return Number.isFinite(deadlineAt) && deadlineAt > now;
      }

      function getNextTaskId(tasks) {
        const nextNumber =
          tasks.reduce((largestNumber, task) => {
            const match = /^task-(\d+)$/.exec(task.id);
            const taskNumber = match ? Number(match[1]) : 0;
            return Math.max(largestNumber, taskNumber);
          }, 0) + 1;

        return `task-${nextNumber}`;
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function getDayStart(timestamp) {
        const date = new Date(timestamp);
        date.setHours(0, 0, 0, 0);
        return date.getTime();
      }

      function getTaskActiveStart(task) {
        return Math.max(task.createdAt, getDayStart(task.deadlineAt));
      }

      function addTask(tasks, text, deadlineAt, now) {
        if (isBlankText(text) || !isValidFutureDeadline(deadlineAt, now)) {
          return tasks;
        }

        return [
          ...tasks,
          {
            id: getNextTaskId(tasks),
            text: text.trim(),
            createdAt: now,
            deadlineAt,
            status: "active",
            completedAt: null,
            failedAt: null,
            hiddenAt: null,
            rescuedAt: null,
            rescueReason: null,
            pettedAt: null,
          },
        ];
      }

      function completeTask(tasks, id, now) {
        let changed = false;

        const nextTasks = tasks.map((task) => {
          if (task.id !== id || task.status !== "active" || now > task.deadlineAt) {
            return task;
          }

          changed = true;

          return {
            ...task,
            status: "completed",
            completedAt: now,
          };
        });

        return changed ? nextTasks : tasks;
      }

      function failOverdueTasks(tasks, now) {
        let changed = false;

        const nextTasks = tasks.map((task) => {
          if (task.status !== "active" || task.deadlineAt >= now) {
            return task;
          }

          changed = true;

          return {
            ...task,
            status: "failed",
            failedAt: now,
            hiddenAt: null,
          };
        });

        return changed ? nextTasks : tasks;
      }

      function rescueLateTask(tasks, id, now, reason) {
        let changed = false;

        const nextTasks = tasks.map((task) => {
          if (task.id !== id || task.status !== "failed") {
            return task;
          }

          changed = true;

          return {
            ...task,
            status: "completed",
            completedAt: now,
            hiddenAt: null,
            rescuedAt: now,
            rescueReason: reason,
          };
        });

        return changed ? nextTasks : tasks;
      }

      function deleteTask(tasks, id) {
        return tasks.filter((task) => task.id !== id);
      }

      function hideExpiredFailedCats(tasks, now) {
        let changed = false;

        const nextTasks = tasks.map((task) => {
          if (
            task.status !== "failed" ||
            !Number.isFinite(task.failedAt) ||
            task.hiddenAt != null ||
            now - task.failedAt < FAILED_CAT_VISIBLE_MS
          ) {
            return task;
          }

          changed = true;

          return {
            ...task,
            hiddenAt: now,
          };
        });

        return changed ? nextTasks : tasks;
      }

      function calculateCatApproach(task, now) {
        if (task.status === "petted") {
          return 1;
        }

        if (task.status === "failed") {
          return 0;
        }

        const activeStart = getTaskActiveStart(task);
        const travelDuration = task.deadlineAt - activeStart;

        if (travelDuration <= 0) {
          return 0;
        }

        return clamp((now - activeStart) / travelDuration, 0, 1);
      }

      function canPetCat(task, now) {
        return (
          task.status === "completed" &&
          task.pettedAt === null &&
          calculateCatApproach(task, now) === 1
        );
      }

      function petCat(tasks, id, now) {
        let changed = false;

        const nextTasks = tasks.map((task) => {
          if (task.id !== id || !canPetCat(task, now)) {
            return task;
          }

          changed = true;

          return {
            ...task,
            status: "petted",
            pettedAt: now,
          };
        });

        return changed ? nextTasks : tasks;
      }

      function calculateCatPerspective(task, now) {
        const approachRatio = calculateCatApproach(task, now);

        if (task.status === "failed") {
          return {
            approachRatio: 1,
            scale: 3.885,
            opacity: 1,
            zIndex: 105,
          };
        }

        return {
          approachRatio,
          scale: 0.32 + approachRatio * 2.6,
          opacity: 1,
          zIndex: Math.round(10 + approachRatio * 90),
        };
      }

      function calculateStats(tasks) {
        return tasks.reduce(
          (stats, task) => ({
            activeCount: stats.activeCount + (task.status === "active" ? 1 : 0),
            completedCount:
              stats.completedCount + (task.status === "completed" || task.status === "petted" ? 1 : 0),
            pettedCount: stats.pettedCount + (task.status === "petted" || task.pettedAt !== null ? 1 : 0),
            returnedCatCount: stats.returnedCatCount + (task.status === "failed" ? 1 : 0),
          }),
          {
            activeCount: 0,
            completedCount: 0,
            pettedCount: 0,
            returnedCatCount: 0,
          },
        );
      }

      function parseDeadline(dateValue, timeValue, fallbackNow) {
        if (!timeValue) {
          return Number.NaN;
        }

        const [hourText, minuteText] = timeValue.split(":");
        const hour = Number(hourText);
        const minute = Number(minuteText);

        if (!Number.isInteger(hour) || !Number.isInteger(minute)) {
          return Number.NaN;
        }

        let deadline;
        if (dateValue) {
          const [yearText, monthText, dayText] = dateValue.split("-");
          const year = Number(yearText);
          const month = Number(monthText);
          const day = Number(dayText);

          if (!Number.isInteger(year) || !Number.isInteger(month) || !Number.isInteger(day)) {
            return Number.NaN;
          }

          deadline = new Date(year, month - 1, day, hour, minute, 0, 0);
        } else {
          deadline = new Date(fallbackNow);
          deadline.setHours(hour, minute, 0, 0);
        }

        return deadline.getTime();
      }

      function formatClock(timestamp) {
        return new Intl.DateTimeFormat("ko-KR", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false,
        }).format(timestamp);
      }

      function formatClockDate(timestamp) {
        const date = new Date(timestamp);
        const month = date.getMonth() + 1;
        const day = date.getDate();
        const weekday = ["\uC77C", "\uC6D4", "\uD654", "\uC218", "\uBAA9", "\uAE08", "\uD1A0"][date.getDay()];
        return `${month}\uC6D4 ${day}\uC77C (${weekday})`;
      }

      function formatDateInputValue(timestamp) {
        const date = new Date(timestamp);
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function formatDeadline(timestamp) {
        return new Intl.DateTimeFormat("ko-KR", {
          hour: "2-digit",
          minute: "2-digit",
          hour12: false,
        }).format(timestamp);
      }

      function formatDeadlineTimeInput(timestamp) {
        if (!Number.isFinite(timestamp)) {
          return "";
        }
        const date = new Date(timestamp);
        const hh = String(date.getHours()).padStart(2, "0");
        const mm = String(date.getMinutes()).padStart(2, "0");
        return `${hh}:${mm}`;
      }

      function createCatScene({ catStage, onCatClick }) {
        const sprites = new Map();

        function buildSprite(task) {
          const sprite = document.createElement("button");
          sprite.type = "button";
          sprite.className = "cat-sprite";
          sprite.textContent = "";
          sprite.dataset.taskId = task.id;
          sprite.setAttribute("aria-label", `${task.text} 헬로키티`);
          sprite.addEventListener("click", () => onCatClick(task.id));
          catStage.appendChild(sprite);
          sprites.set(task.id, sprite);
          return sprite;
        }

        function removeMissingSprites(tasks) {
          const taskIds = new Set(tasks.map((task) => task.id));

          sprites.forEach((sprite, taskId) => {
            if (!taskIds.has(taskId)) {
              sprite.remove();
              sprites.delete(taskId);
            }
          });
        }

        function applyCatPose(sprite, task, index, now, hiddenTaskId) {
          const shouldHide =
            task.id === hiddenTaskId ||
            task.status === "petted" ||
            (task.status === "failed" && task.hiddenAt != null);

          sprite.hidden = shouldHide;

          if (shouldHide) {
            return;
          }

          const perspective = calculateCatPerspective(task, now);
          const lane = LANE_PATTERN[index % LANE_PATTERN.length];
          const approach = perspective.approachRatio;
          const isFailed = task.status === "failed";
          const isArrived = !isFailed && approach >= 1;
          const sideSpread = 90 * (1 - approach * 0.65);
          const laneOffset = lane * sideSpread;
          const bottomPercent = 46 - approach * 65;

          sprite.style.bottom = `${bottomPercent}%`;
          sprite.style.transform = `translate(calc(-50% + ${laneOffset}px), 0) scale(${perspective.scale})`;
          sprite.style.opacity = String(perspective.opacity);
          sprite.style.zIndex = String(perspective.zIndex);
          sprite.setAttribute("aria-disabled", String(isFailed));
          sprite.dataset.status = isFailed ? "failed" : task.status;
          sprite.dataset.arrived = String(isArrived);
        }

        return {
          update(tasks, now, hiddenTaskId = null) {
            removeMissingSprites(tasks);
            tasks.forEach((task, index) => {
              const sprite = sprites.get(task.id) ?? buildSprite(task);
              applyCatPose(sprite, task, index, now, hiddenTaskId);
            });
          },
        };
      }

      function initApp() {
        const form = document.querySelector("[data-task-form]");
        const taskInput = document.querySelector("[data-task-input]");
        const deadlineInput = document.querySelector("[data-deadline-input]");
        const dateInput = document.querySelector("[data-date-input]");
        const message = document.querySelector("[data-message]");
        const panelTitle = document.querySelector("[data-panel-title]");
        const panelViewButtons = [...document.querySelectorAll("[data-panel-view-button]")];
        const taskList = document.querySelector("[data-task-list]");
        const calendarView = document.querySelector("[data-calendar-view]");
        const calendarTitle = document.querySelector("[data-calendar-title]");
        const calendarGrid = document.querySelector("[data-calendar-grid]");
        const calendarDetail = document.querySelector("[data-calendar-detail]");
        const calendarDetailTitle = document.querySelector("[data-calendar-detail-title]");
        const calendarDetailList = document.querySelector("[data-calendar-detail-list]");
        const calendarShareButton = document.querySelector("[data-calendar-share]");
        const calendarPrev = document.querySelector("[data-calendar-prev]");
        const calendarNext = document.querySelector("[data-calendar-next]");
        const emptyPark = document.querySelector("[data-empty-park]");
        const currentTime = document.querySelector("[data-current-time]");
        const currentDate = document.querySelector("[data-current-date]");
        const currentClock = document.querySelector("[data-current-clock]");
        const catStage = document.querySelector("[data-cat-stage]");
        const pettedOverlay = document.querySelector("[data-petted-overlay]");
        const pettedCat = document.querySelector("[data-petted-cat]");
        const pettingHand = document.querySelector("[data-petting-hand]");
        const statActive = document.querySelector("[data-stat-active]");
        const statCompleted = document.querySelector("[data-stat-completed]");
        const quickAddToggle = document.querySelector("[data-quick-add-toggle]");
        const quickAddPanel = document.querySelector("[data-quick-add-panel]");
        const quickAddList = document.querySelector("[data-quick-add-list]");
        const quickAddSubmit = document.querySelector("[data-quick-add-submit]");

        if (
          !form || !taskInput || !deadlineInput || !dateInput || !message || !panelTitle ||
          panelViewButtons.length === 0 || !taskList || !calendarView || !calendarTitle ||
          !calendarGrid || !calendarDetail || !calendarDetailTitle || !calendarDetailList ||
          !calendarShareButton ||
          !calendarPrev || !calendarNext || !emptyPark ||
          !currentTime || !currentDate || !currentClock ||
          !catStage || !pettedOverlay || !pettedCat || !pettingHand ||
          !statActive || !statCompleted || !quickAddToggle || !quickAddPanel ||
          !quickAddList || !quickAddSubmit
        ) {
          return;
        }

        const todayDateValue = formatDateInputValue(Date.now());
        if (!dateInput.value) {
          dateInput.value = todayDateValue;
        }
        dateInput.min = todayDateValue;

        let now = Date.now();
        let activePanelView = "tasks";
        let calendarMonth = new Date(now);
        let selectedCalendarDayKey = getDayKey(now);
        let dailyRecords = loadDailyRecords();
        let tasks = loadStoredTasks();
        let taskHistory = loadTaskHistory(tasks);
        let lastSavedTasksText = "";
        let lastSavedRecordsText = "";

        calendarMonth.setDate(1);

        const MOVE_GRACE_MS = 180;
        let isDragging = false;
        let lastMoveAt = 0;
        let lastTickAt = 0;
        let lastSparkleAt = 0;
        let pointerX = 0;
        let pointerY = 0;
        let pettingRafId = 0;
        let pettingActive = false;
        let hasPettedDuringSession = false;
        let pendingPetTaskId = null;
        let reminderPermissionRequest = null;
        let lockedScrollY = 0;
        const remindedTaskKeys = new Set();

        function readStoredJson(key, fallback) {
          try {
            const savedValue = localStorage.getItem(key);
            return savedValue ? JSON.parse(savedValue) : fallback;
          } catch (_) {
            return fallback;
          }
        }

        function writeStoredJson(key, value) {
          try {
            localStorage.setItem(key, JSON.stringify(value));
          } catch (_) {}
        }

        function loadStoredTasks() {
          const savedTasks = readStoredJson(TASK_STORAGE_KEY, []);

          if (!Array.isArray(savedTasks)) {
            return [];
          }

          return savedTasks.filter((task) => (
            task &&
            typeof task.id === "string" &&
            typeof task.text === "string" &&
            Number.isFinite(task.createdAt) &&
            Number.isFinite(task.deadlineAt)
          ));
        }

        function normalizeTaskText(text) {
          return typeof text === "string" ? text.trim().replace(/\s+/g, " ") : "";
        }

        function loadTaskHistory(seedTasks) {
          const savedHistory = readStoredJson(TASK_HISTORY_STORAGE_KEY, []);
          const historyMap = new Map();

          if (Array.isArray(savedHistory)) {
            savedHistory.forEach((item) => {
              const text = normalizeTaskText(typeof item === "string" ? item : item?.text);

              if (!text) {
                return;
              }

              historyMap.set(text, {
                text,
                lastUsedAt: Number.isFinite(item?.lastUsedAt) ? item.lastUsedAt : 0,
                useCount: Number.isFinite(item?.useCount) ? item.useCount : 1,
                deadlineTime: typeof item?.deadlineTime === "string" ? item.deadlineTime : "",
              });
            });
          }

          seedTasks.forEach((task) => {
            const text = normalizeTaskText(task.text);

            if (!text) {
              return;
            }

            const savedItem = historyMap.get(text);
            const taskCreatedAt = task.createdAt ?? 0;
            const taskTime = formatDeadlineTimeInput(task.deadlineAt);
            const taskIsNewer = taskCreatedAt >= (savedItem?.lastUsedAt ?? 0);
            historyMap.set(text, {
              text,
              lastUsedAt: Math.max(savedItem?.lastUsedAt ?? 0, taskCreatedAt),
              useCount: Math.max(savedItem?.useCount ?? 1, 1),
              deadlineTime: taskIsNewer ? taskTime : (savedItem?.deadlineTime || taskTime),
            });
          });

          return [...historyMap.values()]
            .sort((left, right) => right.lastUsedAt - left.lastUsedAt)
            .slice(0, 24);
        }

        function saveTaskHistory() {
          writeStoredJson(TASK_HISTORY_STORAGE_KEY, taskHistory);
        }

        function rememberTaskText(text, usedAt, deadlineTime) {
          const normalizedText = normalizeTaskText(text);

          if (!normalizedText) {
            return;
          }

          const existingItem = taskHistory.find((item) => item.text === normalizedText);
          const nextDeadlineTime =
            typeof deadlineTime === "string" && deadlineTime
              ? deadlineTime
              : (existingItem?.deadlineTime ?? "");
          const nextItem = {
            text: normalizedText,
            lastUsedAt: usedAt,
            useCount: (existingItem?.useCount ?? 0) + 1,
            deadlineTime: nextDeadlineTime,
          };

          taskHistory = [
            nextItem,
            ...taskHistory.filter((item) => item.text !== normalizedText),
          ].slice(0, 24);
          saveTaskHistory();
        }

        function loadDailyRecords() {
          const records = readStoredJson(DAILY_RECORD_STORAGE_KEY, {});
          return records && typeof records === "object" && !Array.isArray(records) ? records : {};
        }

        function saveTasks() {
          const nextSavedTasksText = JSON.stringify(tasks);

          if (nextSavedTasksText === lastSavedTasksText) {
            return;
          }

          lastSavedTasksText = nextSavedTasksText;
          writeStoredJson(TASK_STORAGE_KEY, tasks);
        }

        function saveDailyRecords() {
          const nextSavedRecordsText = JSON.stringify(dailyRecords);

          if (nextSavedRecordsText === lastSavedRecordsText) {
            return;
          }

          lastSavedRecordsText = nextSavedRecordsText;
          writeStoredJson(DAILY_RECORD_STORAGE_KEY, dailyRecords);
        }

        function getDayKey(timestamp) {
          const date = new Date(timestamp);
          const year = date.getFullYear();
          const month = String(date.getMonth() + 1).padStart(2, "0");
          const day = String(date.getDate()).padStart(2, "0");

          return `${year}-${month}-${day}`;
        }

        function getTaskDayKey(task) {
          return getDayKey(task.deadlineAt);
        }

        function getTasksForDay(dayTimestamp) {
          const dayKey = getDayKey(dayTimestamp);
          return tasks.filter((task) => getTaskDayKey(task) === dayKey);
        }

        function normalizeRescueCounts(value) {
          const counts = value && typeof value === "object" ? value : {};

          return {
            forgot: Number.isFinite(counts.forgot) ? counts.forgot : 0,
            late: Number.isFinite(counts.late) ? counts.late : 0,
          };
        }

        function countTaskRescuesForDay(dayTimestamp, reason) {
          const dayKey = getDayKey(dayTimestamp);
          return tasks.filter((task) => (
            Number.isFinite(task.rescuedAt) &&
            getDayKey(task.rescuedAt) === dayKey &&
            task.rescueReason === reason
          )).length;
        }

        function getRescueCount(dayTimestamp, reason) {
          const dayKey = getDayKey(dayTimestamp);
          const recordCounts = normalizeRescueCounts(dailyRecords[dayKey]?.rescueCounts);
          return Math.max(
            recordCounts[reason] ?? 0,
            countTaskRescuesForDay(dayTimestamp, reason),
          );
        }

        function getRescueRemaining() {
          return Number.POSITIVE_INFINITY;
        }

        function summarizeCalendarTask(task) {
          return {
            id: task.id,
            text: task.text,
            status: task.status,
            deadlineAt: task.deadlineAt,
            completedAt: Number.isFinite(task.completedAt) ? task.completedAt : null,
            failedAt: Number.isFinite(task.failedAt) ? task.failedAt : null,
            rescuedAt: Number.isFinite(task.rescuedAt) ? task.rescuedAt : null,
            rescueReason: typeof task.rescueReason === "string" ? task.rescueReason : null,
            pettedAt: Number.isFinite(task.pettedAt) ? task.pettedAt : null,
          };
        }

        function normalizeCalendarTaskItem(item) {
          if (!item || typeof item.text !== "string") {
            return null;
          }

          return {
            id: typeof item.id === "string" ? item.id : "",
            text: item.text,
            status: typeof item.status === "string" ? item.status : "active",
            deadlineAt: Number.isFinite(item.deadlineAt) ? item.deadlineAt : 0,
            completedAt: Number.isFinite(item.completedAt) ? item.completedAt : null,
            failedAt: Number.isFinite(item.failedAt) ? item.failedAt : null,
            rescuedAt: Number.isFinite(item.rescuedAt) ? item.rescuedAt : null,
            rescueReason: typeof item.rescueReason === "string" ? item.rescueReason : null,
            pettedAt: Number.isFinite(item.pettedAt) ? item.pettedAt : null,
          };
        }

        function getCalendarTaskStatusLabel(item) {
          const rescueSuffix = Number.isFinite(item.rescuedAt)
            ? item.rescueReason === "forgot"
              ? " (깜빡했어)"
              : " (늦게했어)"
            : "";

          if (item.status === "petted") {
            return `쓰다듬기 완료${rescueSuffix}`;
          }

          if (item.status === "completed") {
            return `완료${rescueSuffix}`;
          }

          if (item.status === "failed") {
            return "실패";
          }

          return "진행 중";
        }

        function getCalendarTaskItems(dayKey) {
          const liveItems = tasks
            .filter((task) => getTaskDayKey(task) === dayKey)
            .map(summarizeCalendarTask);

          if (liveItems.length > 0) {
            return liveItems;
          }

          const savedItems = dailyRecords[dayKey]?.taskItems;
          return Array.isArray(savedItems)
            ? savedItems.map(normalizeCalendarTaskItem).filter(Boolean)
            : [];
        }

        function formatCalendarDayTitle(dayKey) {
          const [, monthText, dayText] = dayKey.split("-");
          return `${Number(monthText)}월 ${Number(dayText)}일 할 일`;
        }

        function canRescueLateTask(task) {
          return task?.status === "failed";
        }

        function incrementRescueCount(rescueNow, reason) {
          const dayKey = getDayKey(rescueNow);
          const currentRecord = dailyRecords[dayKey] ?? {};
          const currentCounts = normalizeRescueCounts(currentRecord.rescueCounts);

          dailyRecords = {
            ...dailyRecords,
            [dayKey]: {
              ...currentRecord,
              rescueCounts: {
                ...currentCounts,
                [reason]: getRescueCount(rescueNow, reason) + 1,
              },
            },
          };

          saveDailyRecords();
        }

        function buildDailyRecordFromTasks(dayTasks) {
          const stats = calculateStats(dayTasks);

          return {
            activeCount: dayTasks.length,
            completedCount: stats.completedCount,
            pettedCount: stats.pettedCount,
            returnedCatCount: stats.returnedCatCount,
            rescueCounts: {
              forgot: dayTasks.filter((task) => Number.isFinite(task.rescuedAt) && task.rescueReason === "forgot").length,
              late: dayTasks.filter((task) => Number.isFinite(task.rescuedAt) && task.rescueReason === "late").length,
            },
            taskItems: dayTasks.map(summarizeCalendarTask),
            totalCount: dayTasks.length,
          };
        }

        function calculateTodayStats(statsNow) {
          return buildDailyRecordFromTasks(getTasksForDay(statsNow));
        }

        function saveDailyRecord(recordNow) {
          const dayKey = getDayKey(recordNow);
          const existingRecord = dailyRecords[dayKey] ?? {};
          const nextRecord = calculateTodayStats(recordNow);
          const existingCounts = normalizeRescueCounts(existingRecord.rescueCounts);
          const nextCounts = normalizeRescueCounts(nextRecord.rescueCounts);

          dailyRecords = {
            ...dailyRecords,
            [dayKey]: {
              ...nextRecord,
              rescueCounts: {
                forgot: Math.max(existingCounts.forgot, nextCounts.forgot),
                late: Math.max(existingCounts.late, nextCounts.late),
              },
            },
          };

          saveDailyRecords();
        }

        function archivePastTasks(recordNow) {
          const todayKey = getDayKey(recordNow);
          const currentTasks = [];
          const pastTasksByDay = new Map();

          tasks.forEach((task) => {
            const taskDayKey = getTaskDayKey(task);

            if (taskDayKey >= todayKey) {
              currentTasks.push(task);
              return;
            }

            const dayTasks = pastTasksByDay.get(taskDayKey) ?? [];
            dayTasks.push(task);
            pastTasksByDay.set(taskDayKey, dayTasks);
          });

          if (pastTasksByDay.size === 0) {
            return false;
          }

          const nextDailyRecords = { ...dailyRecords };
          pastTasksByDay.forEach((dayTasks, dayKey) => {
            const existingRecord = nextDailyRecords[dayKey] ?? {};
            const nextRecord = buildDailyRecordFromTasks(dayTasks);
            const existingCounts = normalizeRescueCounts(existingRecord.rescueCounts);
            const nextCounts = normalizeRescueCounts(nextRecord.rescueCounts);
            nextDailyRecords[dayKey] = {
              ...nextRecord,
              rescueCounts: {
                forgot: Math.max(existingCounts.forgot, nextCounts.forgot),
                late: Math.max(existingCounts.late, nextCounts.late),
              },
            };
          });
          dailyRecords = nextDailyRecords;
          tasks = currentTasks;
          saveDailyRecords();
          return true;
        }

        function positionHand(clientX, clientY) {
          pointerX = clientX;
          pointerY = clientY;
          pettingHand.style.left = `${clientX}px`;
          pettingHand.style.top = `${clientY}px`;
        }

        function lockPageScroll() {
          if (document.body.classList.contains("is-petting-locked")) {
            return;
          }

          lockedScrollY = window.scrollY;
          document.body.classList.add("is-petting-locked");
          document.body.style.position = "fixed";
          document.body.style.top = `-${lockedScrollY}px`;
          document.body.style.left = "0";
          document.body.style.right = "0";
          document.body.style.width = "100%";
        }

        function unlockPageScroll() {
          if (!document.body.classList.contains("is-petting-locked")) {
            return;
          }

          document.body.classList.remove("is-petting-locked");
          document.body.style.position = "";
          document.body.style.top = "";
          document.body.style.left = "";
          document.body.style.right = "";
          document.body.style.width = "";
          window.scrollTo(0, lockedScrollY);
        }

        function showHandAtRest() {
          const rect = pettedCat.getBoundingClientRect();
          positionHand(rect.left + rect.width * 0.58, rect.top + rect.height * 0.38);
          pettingHand.hidden = false;
        }

        function isPointOnPettedCat(clientX, clientY) {
          const rect = pettedCat.getBoundingClientRect();
          return (
            clientX >= rect.left &&
            clientX <= rect.right &&
            clientY >= rect.top &&
            clientY <= rect.bottom
          );
        }

        function followPointer(event) {
          if (!pettingActive) {
            return;
          }

          positionHand(event.clientX, event.clientY);
          pettingHand.hidden = false;
          if (isDragging && isPointOnPettedCat(event.clientX, event.clientY)) {
            lastMoveAt = performance.now();
            hasPettedDuringSession = true;
            return;
          }

          if (isDragging) {
            pettingHand.classList.remove("is-rubbing");
            pettedCat.classList.remove("is-being-petted");
          }
        }

        function emitSparkle() {
          const sparkle = document.createElement("div");
          sparkle.className = "petting-sparkle";
          const jitterX = (Math.random() - 0.5) * 30;
          sparkle.style.left = `${pointerX + jitterX}px`;
          sparkle.style.top = `${pointerY - 12}px`;
          document.body.appendChild(sparkle);
          setTimeout(() => sparkle.remove(), 1000);
        }

        function emitHeart() {
          const heart = document.createElement("div");
          heart.className = "petted-heart";
          heart.textContent = "💖";
          document.body.appendChild(heart);
          setTimeout(() => heart.remove(), 1300);
        }

        function pettingTick(timestamp) {
          if (!pettingActive) {
            return;
          }

          if (lastTickAt > 0 && isDragging && timestamp - lastMoveAt < MOVE_GRACE_MS) {
            pettingHand.classList.add("is-rubbing");
            pettedCat.classList.add("is-being-petted");

            if (timestamp - lastSparkleAt > 700) {
              emitSparkle();
              lastSparkleAt = timestamp;
            }
          } else {
            pettingHand.classList.remove("is-rubbing");
            pettedCat.classList.remove("is-being-petted");
          }

          lastTickAt = timestamp;
          pettingRafId = requestAnimationFrame(pettingTick);
        }

        function startPettingSession() {
          lastTickAt = 0;
          lastSparkleAt = 0;
          pettingActive = true;
          if (pettingRafId) {
            cancelAnimationFrame(pettingRafId);
          }
          pettingRafId = requestAnimationFrame(pettingTick);
        }

        function endPettingSession() {
          pettingActive = false;
          isDragging = false;
          if (pettingRafId) {
            cancelAnimationFrame(pettingRafId);
            pettingRafId = 0;
          }
          pettingHand.hidden = pendingPetTaskId === null;
          pettingHand.classList.remove("is-rubbing");
          pettedCat.classList.remove("is-being-petted");
        }

        function completePetting() {
          const taskId = pendingPetTaskId;

          pendingPetTaskId = null;
          endPettingSession();
          emitHeart();
          if (taskId) {
            tasks = petCat(tasks, taskId, Date.now());
            setMessage("쓰다듬기 완료. 헬로키티가 행복해하네요.");
            render();
          }
          setTimeout(() => {
            pettedOverlay.hidden = true;
            unlockPageScroll();
          }, 900);
        }

        function showPettedCat(taskId) {
          pendingPetTaskId = taskId;
          isDragging = false;
          lastMoveAt = 0;
          lastTickAt = 0;
          lastSparkleAt = 0;
          pettingActive = false;
          hasPettedDuringSession = false;
          lockPageScroll();
          pettedOverlay.hidden = false;
          pettedCat.style.animation = "none";
          void pettedCat.offsetWidth;
          pettedCat.style.animation = "";
          requestAnimationFrame(showHandAtRest);
        }

        pettedCat.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          isDragging = true;
          lastMoveAt = performance.now();
          lastSparkleAt = 0;
          hasPettedDuringSession = true;
          positionHand(event.clientX, event.clientY);
          pettingHand.hidden = false;
          startPettingSession();
          if (pettedCat.setPointerCapture) {
            try {
              pettedCat.setPointerCapture(event.pointerId);
            } catch (_) {}
          }
        });

        pettedOverlay.addEventListener("pointermove", followPointer);

        const releaseDrag = (event) => {
          if (event?.pointerId != null && pettedCat.releasePointerCapture) {
            try {
              pettedCat.releasePointerCapture(event.pointerId);
            } catch (_) {}
          }

          const shouldCompletePetting = pendingPetTaskId && hasPettedDuringSession;
          isDragging = false;
          pettingHand.classList.remove("is-rubbing");
          pettedCat.classList.remove("is-being-petted");
          if (shouldCompletePetting) {
            completePetting();
            return;
          }

          endPettingSession();
        };

        pettedCat.addEventListener("pointerup", releaseDrag);
        pettedCat.addEventListener("pointercancel", releaseDrag);
        pettedOverlay.addEventListener("pointerleave", releaseDrag);
        pettedOverlay.addEventListener("touchmove", (event) => {
          event.preventDefault();
        }, { passive: false });

        function setMessage(text) {
          message.textContent = text;
        }

        document.addEventListener("pointerdown", () => {
          if (message.textContent) {
            setMessage("");
          }
        }, { passive: true });

        function getReminderKey(task) {
          return `${task.id}:${task.createdAt}:${task.deadlineAt}`;
        }

        function canRequestBrowserNotification() {
          return "Notification" in window && Notification.permission === "default";
        }

        function requestReminderPermission() {
          if (!("Notification" in window) || Notification.permission !== "default") {
            return Promise.resolve("Notification" in window ? Notification.permission : "unsupported");
          }

          if (!reminderPermissionRequest) {
            reminderPermissionRequest = Notification.requestPermission().finally(() => {
              reminderPermissionRequest = null;
            });
          }

          return reminderPermissionRequest;
        }

        function sendBrowserReminder(task) {
          if (!("Notification" in window) || Notification.permission !== "granted") {
            return;
          }

          try {
            const notificationOptions = {
              body: `${task.text} 마감시간이 10분 남았어요.`,
              tag: `today-cat-${task.id}-${task.deadlineAt}`,
              renotify: true,
            };

            notificationOptions.vibrate = [120, 60, 120];

            new Notification("마감 알림", notificationOptions);
          } catch (_) {}
        }

        function sendDeadlineReminder(task) {
          const reminderText = `${task.text} 마감시간이 10분 남았어요.`;

          setMessage(reminderText);
          sendBrowserReminder(task);

          if (navigator.vibrate) {
            navigator.vibrate([120, 60, 120]);
          }
        }

        function notifyUpcomingDeadlines(reminderNow, reminderTasks = getTasksForDay(reminderNow)) {
          reminderTasks.forEach((task) => {
            const remainingMs = task.deadlineAt - reminderNow;
            const reminderKey = getReminderKey(task);

            if (
              task.status !== "active" ||
              remainingMs <= 0 ||
              remainingMs > DEADLINE_REMINDER_LEAD_MS ||
              remindedTaskKeys.has(reminderKey)
            ) {
              return;
            }

            remindedTaskKeys.add(reminderKey);

            if (canRequestBrowserNotification()) {
              requestReminderPermission().then(() => {
                sendDeadlineReminder(task);
              });
              return;
            }

            sendDeadlineReminder(task);
          });
        }

        function getTaskMessage(task) {
          if (task.status === "active") {
            return "기다리는 중";
          }

          if (task.status === "completed") {
            return canPetCat(task, now) ? "쓰다듬기 가능" : "다가오는 중";
          }

          if (task.status === "petted") {
            return "완료";
          }

          return "놓쳤어요";
        }

        function createTaskItem(task) {
          const item = document.createElement("li");
          item.className = "task-item";
          item.dataset.taskId = task.id;

          const titleRow = document.createElement("div");
          titleRow.className = "task-title-row";

          const title = document.createElement("p");
          title.className = "task-title";
          title.dataset.taskTitle = "";

          const badge = document.createElement("span");
          badge.className = "status-badge";
          badge.dataset.taskBadge = "";

          const meta = document.createElement("p");
          meta.className = "task-meta";
          meta.dataset.taskMeta = "";

          const metaPrefix = document.createElement("span");
          metaPrefix.textContent = "마감 ";

          const timeInput = document.createElement("input");
          timeInput.type = "time";
          timeInput.className = "task-meta-time";
          timeInput.dataset.taskTimeInput = "";
          timeInput.setAttribute("aria-label", `${task.text} 마감 시간 변경`);
          timeInput.addEventListener("change", () => {
            updateTaskDeadline(task.id, timeInput.value);
          });

          const metaSuffix = document.createElement("span");
          metaSuffix.dataset.taskMetaSuffix = "";

          meta.append(metaPrefix, timeInput, metaSuffix);

          const progressTrack = document.createElement("div");
          progressTrack.className = "progress-track";

          const progressFill = document.createElement("div");
          progressFill.className = "progress-fill";
          progressFill.dataset.taskProgress = "";

          const actions = document.createElement("div");
          actions.className = "task-actions";

          const completeButton = document.createElement("button");
          completeButton.className = "small-button";
          completeButton.type = "button";
          completeButton.textContent = "완료";
          completeButton.dataset.completeButton = "";
          completeButton.addEventListener("click", () => {
            tasks = completeTask(tasks, task.id, Date.now());
            render();
          });

          function createRescueButton(reason, label) {
            const button = document.createElement("button");
            button.className = "small-button rescue";
            button.type = "button";
            button.textContent = label;
            button.dataset.rescueButton = reason;
            button.addEventListener("click", () => {
              const rescueNow = Date.now();
              const targetTask = tasks.find((currentTask) => currentTask.id === task.id);

              if (!canRescueLateTask(targetTask)) {
                setMessage(`${label}는 지금 사용할 수 없어요`);
                render();
                return;
              }

              incrementRescueCount(rescueNow, reason);
              tasks = rescueLateTask(tasks, task.id, rescueNow, reason);
              setMessage(`${label}로 구제했어요`);
              render();
            });
            return button;
          }

          const forgotButton = createRescueButton("forgot", "깜빡했어");
          const lateButton = createRescueButton("late", "늦게했어");

          const petButton = document.createElement("button");
          petButton.className = "small-button reward";
          petButton.type = "button";
          petButton.textContent = "쓰다듬기";
          petButton.dataset.petButton = "";
          petButton.addEventListener("click", () => {
            tryPetCat(task.id);
          });

          const deleteButton = document.createElement("button");
          deleteButton.className = "small-button secondary";
          deleteButton.type = "button";
          deleteButton.textContent = "삭제";
          deleteButton.addEventListener("click", () => {
            tasks = deleteTask(tasks, task.id);
            setMessage("");
            if (!quickAddPanel.hidden) {
              renderQuickAdd();
            }
            render();
          });

          titleRow.append(title, badge);
          progressTrack.append(progressFill);
          actions.append(completeButton, forgotButton, lateButton, petButton, deleteButton);
          item.append(titleRow, meta, progressTrack, actions);
          updateTaskItem(item, task);

          return item;
        }

        function updateTaskItem(item, task) {
          const title = item.querySelector("[data-task-title]");
          const badge = item.querySelector("[data-task-badge]");
          const timeInput = item.querySelector("[data-task-time-input]");
          const metaSuffix = item.querySelector("[data-task-meta-suffix]");
          const progress = item.querySelector("[data-task-progress]");
          const completeButton = item.querySelector("[data-complete-button]");
          const rescueButtons = [...item.querySelectorAll("[data-rescue-button]")];
          const petButton = item.querySelector("[data-pet-button]");
          const approachPercent = Math.round(calculateCatApproach(task, now) * 100);

          title.textContent = task.text;
          badge.textContent = getTaskMessage(task);

          const desiredTimeValue = formatDeadlineTimeInput(task.deadlineAt);
          if (document.activeElement !== timeInput && timeInput.value !== desiredTimeValue) {
            timeInput.value = desiredTimeValue;
          }
          timeInput.disabled = task.status !== "active";

          metaSuffix.textContent = ` · 접근률 ${approachPercent}%`;
          progress.style.width = `${approachPercent}%`;
          completeButton.disabled = task.status !== "active";
          rescueButtons.forEach((button) => {
            const reason = button.dataset.rescueButton;
            const label = reason === "forgot" ? "깜빡했어" : "늦게했어";

            button.hidden = task.status !== "failed";
            button.disabled = task.status !== "failed";
            button.title = label;
            button.textContent = label;
          });
          petButton.disabled = !canPetCat(task, now);
        }

        function renderTasks() {
          const visibleTasks = getTasksForDay(now);
          const taskIds = new Set(visibleTasks.map((task) => task.id));
          const existingItems = new Map(
            [...taskList.children].map((item) => [item.dataset.taskId, item]),
          );

          [...taskList.children].forEach((item) => {
            if (!taskIds.has(item.dataset.taskId)) {
              item.remove();
            }
          });

          visibleTasks.forEach((task, index) => {
            const item = existingItems.get(task.id) ?? createTaskItem(task);
            const currentItem = taskList.children[index];

            updateTaskItem(item, task);

            if (currentItem !== item) {
              taskList.insertBefore(item, currentItem ?? null);
            }
          });

          emptyPark.hidden = visibleTasks.length > 0;
        }

        function getQuickAddOptions() {
          const todayKey = getDayKey(Date.now());
          const todayTaskTexts = new Set(
            tasks
              .filter((task) => getTaskDayKey(task) === todayKey)
              .map((task) => normalizeTaskText(task.text)),
          );

          return taskHistory
            .filter((item) => !todayTaskTexts.has(item.text))
            .sort((left, right) => (
              (right.useCount ?? 0) - (left.useCount ?? 0) ||
              (right.lastUsedAt ?? 0) - (left.lastUsedAt ?? 0)
            ))
            .slice(0, 5);
        }

        function renderQuickAdd() {
          const itemStates = new Map(
            [...quickAddList.querySelectorAll("[data-quick-add-item]")]
              .map((row) => {
                const checkbox = row.querySelector("[data-quick-add-checkbox]");
                const timeInput = row.querySelector("[data-quick-add-time]");
                return [
                  checkbox?.value,
                  {
                    checked: Boolean(checkbox?.checked),
                    deadlineTime: timeInput?.value ?? "",
                  },
                ];
              })
              .filter(([text]) => Boolean(text)),
          );
          const options = getQuickAddOptions();

          quickAddList.textContent = "";

          if (options.length === 0) {
            quickAddSubmit.disabled = true;
            return;
          }

          quickAddSubmit.disabled = false;
          options.forEach((item, index) => {
            const row = document.createElement("div");
            const checkbox = document.createElement("input");
            const text = document.createElement("label");
            const timeInput = document.createElement("input");
            const savedState = itemStates.get(item.text);
            const checkboxId = `quick-add-${index}`;

            row.className = "quick-add-item";
            row.dataset.quickAddItem = "";
            checkbox.type = "checkbox";
            checkbox.id = checkboxId;
            checkbox.value = item.text;
            checkbox.dataset.quickAddCheckbox = "";
            checkbox.checked = savedState?.checked ?? false;
            text.className = "quick-add-text";
            text.htmlFor = checkboxId;
            text.textContent = item.text;
            text.dataset.quickAddText = "";
            timeInput.className = "quick-add-time";
            timeInput.type = "time";
            timeInput.value = savedState?.deadlineTime ?? item.deadlineTime ?? "";
            timeInput.dataset.quickAddTime = "";
            timeInput.setAttribute("aria-label", `${item.text} 마감 시간`);
            timeInput.addEventListener("focus", () => {
              checkbox.checked = true;
            });

            row.append(checkbox, text, timeInput);
            quickAddList.appendChild(row);
          });
        }

        function getSelectedQuickAddItems() {
          return [...quickAddList.querySelectorAll("[data-quick-add-item]")]
            .map((row) => {
              const checkbox = row.querySelector("[data-quick-add-checkbox]");
              const timeInput = row.querySelector("[data-quick-add-time]");

              return {
                text: checkbox?.value ?? "",
                checked: Boolean(checkbox?.checked),
                deadlineTime: timeInput?.value ?? "",
                timeInput,
              };
            })
            .filter((item) => item.checked && item.text);
        }

        function createCalendarCount(icon, variant, count) {
          const item = document.createElement("span");
          item.className = `calendar-count calendar-count--${variant}`;
          const iconEl = document.createElement("span");
          iconEl.className = "calendar-count-icon";
          iconEl.textContent = icon;
          const countEl = document.createElement("span");
          countEl.className = "calendar-count-value";
          countEl.textContent = String(count);
          item.append(iconEl, countEl);
          return item;
        }

        function updateTaskDeadline(taskId, newTimeValue) {
          if (!newTimeValue) {
            return;
          }

          const target = tasks.find((task) => task.id === taskId);

          if (!target || target.status !== "active") {
            return;
          }

          const submittedAt = Date.now();
          const dateValue = formatDateInputValue(target.deadlineAt);
          const newDeadline = parseDeadline(dateValue, newTimeValue, submittedAt);

          if (!isValidFutureDeadline(newDeadline, submittedAt)) {
            setMessage("현재 시각보다 늦은 마감 시간을 입력해 주세요");
            render();
            return;
          }

          if (newDeadline === target.deadlineAt) {
            return;
          }

          tasks = tasks.map((task) =>
            task.id === taskId ? { ...task, deadlineAt: newDeadline } : task,
          );
          setMessage("마감 시간을 변경했어요");
          render();
        }

        const shareCatImage = new Image();
        shareCatImage.src = "./public/cat-summary.png";
        const shareTitleImage = new Image();
        shareTitleImage.src = "./public/title-logo.png";

        function parseDayKeyToDate(dayKey) {
          const [yearText, monthText, dayText] = dayKey.split("-");
          return new Date(Number(yearText), Number(monthText) - 1, Number(dayText));
        }

        function drawRoundedRect(ctx, x, y, w, h, radius) {
          ctx.beginPath();
          ctx.moveTo(x + radius, y);
          ctx.arcTo(x + w, y, x + w, y + h, radius);
          ctx.arcTo(x + w, y + h, x, y + h, radius);
          ctx.arcTo(x, y + h, x, y, radius);
          ctx.arcTo(x, y, x + w, y, radius);
          ctx.closePath();
        }

        function drawContainImage(ctx, image, x, y, maxWidth, maxHeight) {
          const scale = Math.min(maxWidth / image.naturalWidth, maxHeight / image.naturalHeight);
          const width = image.naturalWidth * scale;
          const height = image.naturalHeight * scale;
          ctx.drawImage(
            image,
            x + (maxWidth - width) / 2,
            y + (maxHeight - height) / 2,
            width,
            height,
          );
          return { width, height };
        }

        function buildShareImageDataUrl(dayKey) {
          const items = getCalendarTaskItems(dayKey)
            .slice()
            .sort((left, right) => {
              const leftDeadline = Number.isFinite(left.deadlineAt) ? left.deadlineAt : 0;
              const rightDeadline = Number.isFinite(right.deadlineAt) ? right.deadlineAt : 0;
              return leftDeadline - rightDeadline || left.text.localeCompare(right.text, "ko-KR");
            });
          const fontFamily = '"Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", Gulim, "굴림", system-ui, sans-serif';

          const dpr = 2;
          const W = 1080;
          const H = 1920;
          const canvas = document.createElement("canvas");
          canvas.width = W * dpr;
          canvas.height = H * dpr;
          const ctx = canvas.getContext("2d");
          ctx.scale(dpr, dpr);

          ctx.fillStyle = "#fff7f0";
          ctx.fillRect(0, 0, W, H);

          drawRoundedRect(ctx, 44, 44, W - 88, H - 88, 44);
          ctx.fillStyle = "#ffffff";
          ctx.fill();
          ctx.strokeStyle = "#fde7e1";
          ctx.lineWidth = 3;
          ctx.stroke();

          if (shareTitleImage.complete && shareTitleImage.naturalWidth > 0) {
            drawContainImage(ctx, shareTitleImage, 220, 92, 640, 160);
          }

          const date = parseDayKeyToDate(dayKey);
          const weekday = ["일", "월", "화", "수", "목", "금", "토"][date.getDay()];
          const dateLine = `${date.getFullYear()}년 ${date.getMonth() + 1}월 ${date.getDate()}일 (${weekday})`;
          ctx.textAlign = "center";
          ctx.fillStyle = "#0f172a";
          ctx.font = `850 44px ${fontFamily}`;
          ctx.fillText(dateLine, W / 2, 318);

          const cardX = 84;
          const cardWidth = W - 168;
          const rowHeight = 88;
          const rowGap = 14;
          let y = 398;
          const maxY = H - 610;

          const visibleItems = items.slice();

          if (visibleItems.length === 0) {
            ctx.fillStyle = "#94a3b8";
            ctx.font = `750 34px ${fontFamily}`;
            ctx.textAlign = "center";
            ctx.fillText("기록된 할 일이 없어요", W / 2, y + 78);
          }

          visibleItems.forEach((item) => {
            if (y + rowHeight > maxY) {
              return;
            }

            drawRoundedRect(ctx, cardX, y, cardWidth, rowHeight, 20);
            ctx.fillStyle = "#ffffff";
            ctx.fill();
            ctx.strokeStyle = "#e2e8f0";
            ctx.lineWidth = 1.5;
            ctx.stroke();

            let icon = "•";
            let iconColor = "#94a3b8";
            if (item.status === "petted" || item.status === "completed") {
              icon = "✓";
              iconColor = "#16a34a";
            } else if (item.status === "failed") {
              icon = "✗";
              iconColor = "#dc2626";
            }

            ctx.textAlign = "center";
            ctx.fillStyle = iconColor;
            ctx.font = `900 40px ${fontFamily}`;
            ctx.fillText(icon, cardX + 42, y + 56);

            ctx.textAlign = "left";
            ctx.fillStyle = "#0f172a";
            ctx.font = `800 30px ${fontFamily}`;
            const maxTextWidth = cardWidth - 90 - 220;
            const truncated = truncateForCanvas(ctx, item.text, maxTextWidth);
            ctx.fillText(truncated, cardX + 76, y + 41);

            ctx.fillStyle = "#64748b";
            ctx.font = `700 23px ${fontFamily}`;
            const deadlineText = Number.isFinite(item.deadlineAt) && item.deadlineAt > 0
              ? `마감 ${formatDeadline(item.deadlineAt)} · ${getCalendarTaskStatusLabel(item)}`
              : getCalendarTaskStatusLabel(item);
            ctx.fillText(truncateForCanvas(ctx, deadlineText, maxTextWidth + 200), cardX + 76, y + 70);

            y += rowHeight + rowGap;
          });

          if (shareCatImage.complete && shareCatImage.naturalWidth > 0) {
            const kittyHeight = 529;
            const ratio = shareCatImage.naturalWidth / shareCatImage.naturalHeight;
            const kittyWidth = kittyHeight * ratio;
            const kittyInset = 9;
            const kittyX = W - 44 - kittyInset - kittyWidth;
            const kittyY = H - 44 - kittyInset - kittyHeight;
            ctx.drawImage(
              shareCatImage,
              kittyX,
              kittyY,
              kittyWidth,
              kittyHeight,
            );
          }

          return canvas.toDataURL("image/png");
        }

        function truncateForCanvas(ctx, text, maxWidth) {
          if (ctx.measureText(text).width <= maxWidth) {
            return text;
          }
          const ellipsis = "…";
          let result = text;
          while (result.length > 1 && ctx.measureText(result + ellipsis).width > maxWidth) {
            result = result.slice(0, -1);
          }
          return result + ellipsis;
        }

        function loadShareImages(onReady, onError) {
          const images = [shareCatImage, shareTitleImage];
          let pending = 0;
          let failed = false;

          images.forEach((image) => {
            if (image.complete) {
              if (image.naturalWidth > 0) {
                return;
              }
              failed = true;
              return;
            }
            pending += 1;
            image.addEventListener("load", () => {
              pending -= 1;
              if (!failed && pending === 0) {
                onReady();
              }
            }, { once: true });
            image.addEventListener("error", () => {
              if (!failed) {
                failed = true;
                onError();
              }
            }, { once: true });
          });

          if (failed) {
            onError();
          } else if (pending === 0) {
            onReady();
          }
        }

        function downloadShareImage() {
          const run = () => {
            try {
              const dataUrl = buildShareImageDataUrl(selectedCalendarDayKey);
              const link = document.createElement("a");
              link.href = dataUrl;
              link.download = `share-${selectedCalendarDayKey}.png`;
              document.body.appendChild(link);
              link.click();
              link.remove();
              setMessage("공유 이미지를 저장했어요");
            } catch (error) {
              setMessage("공유 이미지 저장에 실패했어요");
            }
          };

          loadShareImages(run, () => {
            setMessage("공유 이미지 저장에 실패했어요");
          });
        }

        function addToTodayFromCalendar(item) {
          const submittedAt = Date.now();
          const todayDateValue = formatDateInputValue(submittedAt);
          const itemTime = formatDeadlineTimeInput(item.deadlineAt);
          let deadlineAt = itemTime
            ? parseDeadline(todayDateValue, itemTime, submittedAt)
            : Number.NaN;

          if (!isValidFutureDeadline(deadlineAt, submittedAt)) {
            deadlineAt = submittedAt + 60 * 60 * 1000;
          }

          const nextTasks = addTask(tasks, item.text, deadlineAt, submittedAt);

          if (nextTasks === tasks) {
            setMessage("오늘 할 일에 추가할 수 없어요");
            return;
          }

          tasks = nextTasks;
          rememberTaskText(item.text, submittedAt, formatDeadlineTimeInput(deadlineAt));
          requestReminderPermission().catch(() => {});
          setMessage("오늘 할 일에 추가했어요");
          renderQuickAdd();
          render();
        }

        function renderCalendarDetail() {
          const items = getCalendarTaskItems(selectedCalendarDayKey)
            .slice()
            .sort((left, right) => {
              const leftDeadline = Number.isFinite(left.deadlineAt) ? left.deadlineAt : 0;
              const rightDeadline = Number.isFinite(right.deadlineAt) ? right.deadlineAt : 0;
              return leftDeadline - rightDeadline || left.text.localeCompare(right.text, "ko-KR");
            });

          calendarDetail.hidden = false;
          calendarDetailTitle.textContent = formatCalendarDayTitle(selectedCalendarDayKey);
          calendarDetailList.textContent = "";

          if (items.length === 0) {
            const empty = document.createElement("p");
            const record = dailyRecords[selectedCalendarDayKey] ?? {};
            const completedCount = record.completedCount ?? 0;
            const returnedCatCount = record.returnedCatCount ?? 0;

            empty.className = "calendar-detail-empty";
            empty.textContent =
              completedCount > 0 || returnedCatCount > 0
                ? `이전 기록: 완료 ${completedCount}개 · 실패 ${returnedCatCount}개`
                : "기록된 할 일이 없어요";
            calendarDetailList.appendChild(empty);
            return;
          }

          items.forEach((item) => {
            const row = document.createElement("div");
            const main = document.createElement("div");
            const name = document.createElement("span");
            const meta = document.createElement("span");
            const status = document.createElement("span");
            const action = document.createElement("button");
            const deadlineText = Number.isFinite(item.deadlineAt) && item.deadlineAt > 0
              ? `마감 ${formatDeadline(item.deadlineAt)}`
              : "마감 시간 없음";

            row.className = "calendar-detail-item";
            main.className = "calendar-detail-main";
            name.className = "calendar-detail-name";
            name.textContent = item.text;
            meta.className = "calendar-detail-meta";
            status.className = "calendar-detail-status";
            status.textContent = getCalendarTaskStatusLabel(item);
            meta.append(status, ` · ${deadlineText}`);
            main.append(name, meta);

            action.type = "button";
            action.className = "small-button calendar-detail-action";
            action.textContent = "오늘도 할래";
            action.addEventListener("click", () => addToTodayFromCalendar(item));

            row.append(main, action);
            calendarDetailList.appendChild(row);
          });
        }

        function renderCalendar() {
          const year = calendarMonth.getFullYear();
          const month = calendarMonth.getMonth();
          const firstDay = new Date(year, month, 1);
          const daysInMonth = new Date(year, month + 1, 0).getDate();
          const todayKey = getDayKey(now);
          const visibleMonthKey = `${year}-${String(month + 1).padStart(2, "0")}`;

          calendarTitle.textContent = `${year}년 ${month + 1}월`;
          calendarGrid.textContent = "";

          if (!selectedCalendarDayKey || !selectedCalendarDayKey.startsWith(visibleMonthKey)) {
            selectedCalendarDayKey = todayKey.startsWith(visibleMonthKey)
              ? todayKey
              : getDayKey(firstDay.getTime());
          }

          for (let index = 0; index < firstDay.getDay(); index += 1) {
            const emptyDay = document.createElement("div");
            emptyDay.className = "calendar-day is-empty";
            calendarGrid.appendChild(emptyDay);
          }

          for (let day = 1; day <= daysInMonth; day += 1) {
            const date = new Date(year, month, day);
            const dayKey = getDayKey(date.getTime());
            const record = dailyRecords[dayKey] ?? {
              activeCount: 0,
              completedCount: 0,
            };
            const dayCell = document.createElement("button");
            const dayNumber = document.createElement("span");
            const dayClassNames = ["calendar-day"];

            if (dayKey === todayKey) {
              dayClassNames.push("is-today");
            }

            if (dayKey === selectedCalendarDayKey) {
              dayClassNames.push("is-selected");
            }

            dayCell.type = "button";
            dayCell.className = dayClassNames.join(" ");
            dayCell.dataset.calendarDay = dayKey;
            dayCell.setAttribute("aria-label", `${day}일 기록 보기`);
            dayCell.setAttribute("aria-pressed", String(dayKey === selectedCalendarDayKey));
            dayCell.addEventListener("click", () => {
              selectedCalendarDayKey = dayKey;
              renderCalendar();
            });
            dayNumber.className = "calendar-date";
            dayNumber.textContent = String(day);
            dayCell.append(
              dayNumber,
              createCalendarCount("✓", "done", record.completedCount ?? 0),
              createCalendarCount("✗", "failed", record.returnedCatCount ?? 0),
            );
            calendarGrid.appendChild(dayCell);
          }

          renderCalendarDetail();
        }

        function renderPanelView() {
          const showingCalendar = activePanelView === "calendar";

          taskList.hidden = showingCalendar;
          calendarView.hidden = !showingCalendar;
          panelTitle.textContent = showingCalendar ? "기록 캘린더" : "할 일 목록";

          panelViewButtons.forEach((button) => {
            const isActive = button.dataset.panelViewButton === activePanelView;
            button.classList.toggle("is-active", isActive);
            button.setAttribute("aria-selected", String(isActive));
          });

          if (showingCalendar) {
            renderCalendar();
          }
        }

        function renderStats() {
          const stats = calculateTodayStats(Date.now());

          statActive.textContent = String(stats.activeCount);
          statCompleted.textContent = String(stats.completedCount);
        }

        const catScene = createCatScene({
          catStage,
          onCatClick(taskId) {
            tryPetCat(taskId);
          },
        });

        function render() {
          now = Date.now();
          tasks = failOverdueTasks(tasks, now);
          tasks = hideExpiredFailedCats(tasks, now);
          const archivedPastTasks = archivePastTasks(now);
          const todayTasks = getTasksForDay(now);
          saveTasks();
          saveDailyRecord(now);
          notifyUpcomingDeadlines(now, todayTasks);
          currentDate.textContent = formatClockDate(now);
          currentClock.textContent = formatClock(now);
          const todayDate = formatDateInputValue(now);
          dateInput.min = todayDate;
          if (!dateInput.value || dateInput.value < todayDate) {
            dateInput.value = todayDate;
          }
          renderStats();
          renderTasks();
          renderPanelView();
          if (archivedPastTasks && !quickAddPanel.hidden) {
            renderQuickAdd();
          }
          catScene.update(todayTasks, now, pendingPetTaskId);
        }

        function tryPetCat(taskId) {
          const targetTask = tasks.find((task) => task.id === taskId);

          if (pendingPetTaskId) {
            return;
          }

          if (!targetTask || !canPetCat(targetTask, Date.now())) {
            setMessage("아직 충분히 가까이 오지 않았어요");
            return;
          }

          setMessage("헬로키티 등을 쓰다듬어 주세요.");
          showPettedCat(taskId);
          render();
        }

        panelViewButtons.forEach((button) => {
          button.addEventListener("click", () => {
            activePanelView = button.dataset.panelViewButton === "calendar" ? "calendar" : "tasks";
            render();
          });
        });

        calendarPrev.addEventListener("click", () => {
          calendarMonth = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() - 1, 1);
          render();
        });

        calendarNext.addEventListener("click", () => {
          calendarMonth = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() + 1, 1);
          render();
        });

        calendarShareButton.addEventListener("click", () => {
          downloadShareImage();
        });

        quickAddToggle.addEventListener("click", () => {
          quickAddPanel.hidden = !quickAddPanel.hidden;

          if (!quickAddPanel.hidden) {
            renderQuickAdd();
          }
        });

        quickAddSubmit.addEventListener("click", () => {
          const selectedItems = getSelectedQuickAddItems();

          if (selectedItems.length === 0) {
            setMessage("추가할 항목을 선택해 주세요");
            return;
          }

          if (!dateInput.value) {
            setMessage("날짜를 선택해 주세요");
            dateInput.focus();
            return;
          }

          const missingTimeItem = selectedItems.find((item) => !item.deadlineTime);
          if (missingTimeItem) {
            setMessage("빠른 추가 시간을 입력해 주세요");
            missingTimeItem.timeInput?.focus();
            return;
          }

          const submittedAt = Date.now();
          const selectedTasks = selectedItems.map((item) => ({
            ...item,
            deadlineAt: parseDeadline(dateInput.value, item.deadlineTime, submittedAt),
          }));
          const invalidTimeItem = selectedTasks.find((item) => !isValidFutureDeadline(item.deadlineAt, submittedAt));

          if (invalidTimeItem) {
            setMessage("현재 시각보다 늦은 빠른 추가 시간을 입력해 주세요");
            invalidTimeItem.timeInput?.focus();
            return;
          }

          selectedTasks.forEach((item) => {
            tasks = addTask(tasks, item.text, item.deadlineAt, submittedAt);
            rememberTaskText(item.text, submittedAt, item.deadlineTime);
          });

          requestReminderPermission().catch(() => {});
          setMessage("");
          renderQuickAdd();
          render();
        });

        form.addEventListener("submit", (event) => {
          event.preventDefault();

          const submittedAt = Date.now();
          const deadlineAt = parseDeadline(dateInput.value, deadlineInput.value, submittedAt);
          const nextTasks = addTask(tasks, taskInput.value, deadlineAt, submittedAt);

          if (taskInput.value.trim().length === 0) {
            setMessage("할 일을 입력해 주세요");
            taskInput.focus();
            return;
          }

          if (!dateInput.value) {
            setMessage("날짜를 선택해 주세요");
            dateInput.focus();
            return;
          }

          if (!deadlineInput.value) {
            setMessage("마감 시간을 입력해 주세요");
            deadlineInput.focus();
            return;
          }

          if (nextTasks === tasks) {
            setMessage("현재 시각보다 늦은 마감 시간을 입력해 주세요");
            deadlineInput.focus();
            return;
          }

          requestReminderPermission().catch(() => {});
          tasks = nextTasks;
          rememberTaskText(taskInput.value, submittedAt, deadlineInput.value);
          taskInput.value = "";
          setMessage("");
          renderQuickAdd();
          render();
        });

        setInterval(render, 250);
        renderQuickAdd();
        render();
      }

      document.addEventListener("dblclick", (event) => {
        event.preventDefault();
      }, { passive: false });

      document.addEventListener("touchmove", (event) => {
        if (event.touches.length > 1) {
          event.preventDefault();
        }
      }, { passive: false });

      ["gesturestart", "gesturechange", "gestureend"].forEach((eventName) => {
        document.addEventListener(eventName, (event) => {
          event.preventDefault();
        }, { passive: false });
      });

      document.addEventListener("DOMContentLoaded", initApp);
    </script>
  </body>
</html>
